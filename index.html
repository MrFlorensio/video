<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Lore intro relay</title>
  <style>
    html, body { margin: 0; height: 100%; background: #000; overflow: hidden; }
    #wrap { position: fixed; inset: 0; }
    iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: 0; }
  </style>
</head>
<body>
  <div id="wrap"></div>
  <script>
(function () {
  var q = new URLSearchParams(location.search);
  var v = q.get("v");
  if (!v || !/^[a-zA-Z0-9_-]{6,32}$/.test(v)) {
    document.getElementById("wrap").innerHTML =
      "<p style=color:#888;font-family:sans-serif;padding:1rem>Нужен параметр <code>?v=</code> с id ролика YouTube.</p>";
    return;
  }
  var muted = q.get("muted") === "1";
  var origin = location.origin;
  var ref = location.href;
  var p = new URLSearchParams({
    autoplay: "1",
    mute: muted ? "1" : "0",
    playsinline: "1",
    rel: "0",
    modestbranding: "1",
    controls: "0",
    fs: "0",
    disablekb: "1",
    iv_load_policy: "3",
    enablejsapi: "1",
    origin: origin,
    widget_referrer: ref
  });
  var src = "https://www.youtube-nocookie.com/embed/" + encodeURIComponent(v) + "?" + p.toString();
  var f = document.createElement("iframe");
  f.id = "ytIntroRelay";
  f.setAttribute("allow", "accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture");
  f.setAttribute("referrerpolicy", "strict-origin-when-cross-origin");
  f.src = src;
  document.getElementById("wrap").appendChild(f);

  var tag = document.createElement("script");
  tag.src = "https://www.youtube.com/iframe_api";
  tag.onerror = function () {};
  document.head.appendChild(tag);

  window.onYouTubeIframeAPIReady = function () {
    try {
      new YT.Player("ytIntroRelay", {
        events: {
          onStateChange: function (e) {
            if (e.data === 0) { try { gmod.LoreIntroDone(); } catch (x) {} }
          }
        }
      });
    } catch (e) {}
  };
})();
  </script>
</body>
</html>
